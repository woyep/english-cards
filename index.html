<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>English Words Cards</title>
    <link rel="stylesheet" href="english-cards.css" />
  </head>
  <body>
    <h1>English Words Cards</h1>

    <div style="margin-bottom: 30px">
      <button onclick="loadWordSet('animal')">Animal</button>
      <button onclick="loadWordSet('body-face')">The Body & The Face</button>
      <button onclick="loadWordSet('clothes')">Clothes</button>
      <button onclick="loadWordSet('colours')">Colours</button>
      <button onclick="loadWordSet('family-friends')">Family & Friends</button>
      <button onclick="loadWordSet('food-drink')">Food & Drink</button>
      <button onclick="loadWordSet('home')">Home</button>
      <button onclick="loadWordSet('it')">IT</button>
      <button onclick="loadWordSet('numbers')">Numbers</button>
    </div>

    <div style="margin-bottom: 20px">
      <button onclick="setMode('read')">READ</button>
      <button onclick="setMode('spell')">SPELL</button>
    </div>

    <div>
      <img id="image" src="" alt="word image" />
    </div>

    <div id="read-mode" style="margin-top: 20px">
      <p id="word-display" style="font-size: 100px"></p>
    </div>

    <div id="spell-mode" style="margin-top: 20px; display: none">
      <input id="input-word" placeholder="请输入单词" />
      <button onclick="checkAnswer()">CHECK</button>
      <p id="feedback"></p>
      <p id="correct-answer"></p>
    </div>

    <div>
      <button onclick="showText()">SHOW</button>
      <button onclick="nextWord()">NEXT</button>
    </div>

    <script src="english-cards.js"></script>
  </body>
</html>
